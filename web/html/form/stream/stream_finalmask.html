{{define "form/streamFinalMask"}}
<a-divider :style="{ margin: '5px 0 0' }"></a-divider>
<a-form :colon="false" :label-col="{ md: {span:8} }"
    :wrapper-col="{ md: {span:14} }">
    <a-form-item label="UDP Masks">
        <a-button icon="plus" type="primary" size="small"
            @click="inbound.stream.addUdpMask(inbound.stream.network === 'kcp' ? 'mkcp-aes128gcm' : 'xdns')"></a-button>
    </a-form-item>
    <template
        v-if="inbound.stream.finalmask.udp && inbound.stream.finalmask.udp.length > 0">
        <a-form v-for="(mask, index) in inbound.stream.finalmask.udp"
            :key="index" :colon="false"
            :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
            <a-divider :style="{ margin: '0' }"> UDP Mask [[ index + 1 ]]
                <a-icon type="delete"
                    @click="() => inbound.stream.delUdpMask(index)"
                    :style="{ color: 'rgb(255, 77, 79)', cursor: 'pointer' }"></a-icon>
            </a-divider>
            <a-form-item label='Type'>
                <a-select v-model="mask.type"
                    @change="(type) => { mask.settings = mask._getDefaultSettings(type, {}); if(inbound.stream.network === 'kcp') { inbound.stream.kcp.mtu = type === 'xdns' ? 900 : 1350; } }"
                    :dropdown-class-name="themeSwitcher.currentTheme">
                    <!-- mKCP-specific masks -->
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="mkcp-aes128gcm">
                        mKCP AES-128-GCM</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-dns">
                        Header DNS</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-dtls">
                        Header DTLS 1.2</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-srtp">
                        Header SRTP</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-utp">
                        Header uTP</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-wechat">
                        Header WeChat Video</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="header-wireguard">
                        Header WireGuard</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="mkcp-original">
                        mKCP Original</a-select-option>
                    <a-select-option v-if="inbound.stream.network === 'kcp'"
                        value="xicmp">
                        xICMP (Experimental)</a-select-option>
                    <!-- xDNS for TCP/WS/HTTPUpgrade/XHTTP/KCP -->
                    <a-select-option
                        v-if="['tcp', 'ws', 'httpupgrade', 'xhttp', 'kcp'].includes(inbound.stream.network)"
                        value="xdns">
                        xDNS (Experimental)</a-select-option>
                    <!-- Salamander for all networks -->
                    <a-select-option
                        v-if="['tcp', 'ws', 'httpupgrade', 'xhttp', 'kcp'].includes(inbound.stream.network)"
                        value="salamander">
                        Salamander</a-select-option>
                    <!-- Noise for all networks -->
                    <a-select-option
                        v-if="['tcp', 'ws', 'httpupgrade', 'xhttp', 'kcp'].includes(inbound.stream.network)"
                        value="noise">
                        Noise</a-select-option>
                    <!-- Header Custom for all networks -->
                    <a-select-option
                        v-if="['tcp', 'ws', 'httpupgrade', 'xhttp', 'kcp'].includes(inbound.stream.network)"
                        value="header-custom">
                        Header Custom</a-select-option>
                    <!-- Sudoku (UDP) for non-kcp networks -->
                    <a-select-option
                        v-if="['tcp', 'ws', 'httpupgrade', 'xhttp'].includes(inbound.stream.network)"
                        value="sudoku">
                        Sudoku</a-select-option>
                </a-select>
            </a-form-item>
            <!-- Settings for password-based masks -->
            <a-form-item label='Password'
                v-if="['mkcp-aes128gcm', 'salamander'].includes(mask.type)">
                <a-input v-model.trim="mask.settings.password"
                    placeholder="Obfuscation password"></a-input>
            </a-form-item>
            <!-- Settings for domain-based masks -->
            <a-form-item label='Domain'
                v-if="['header-dns', 'xdns'].includes(mask.type)">
                <a-input v-model.trim="mask.settings.domain"
                    placeholder="e.g., www.example.com"></a-input>
            </a-form-item>
            <!-- Settings for xICMP -->
            <a-form-item label='Listen IP'
                v-if="mask.type === 'xicmp'">
                <a-input v-model.trim="mask.settings.listenIp"
                    placeholder="e.g., 1.1.1.1"></a-input>
            </a-form-item>
            <a-form-item label='ID'
                v-if="mask.type === 'xicmp'">
                <a-input-number v-model.number="mask.settings.id"
                    :min="0" :max="65535"></a-input-number>
            </a-form-item>
            <!-- Settings for Noise -->
            <template v-if="mask.type === 'noise'">
                <a-form-item label='Reset'>
                    <a-switch v-model="mask.settings.reset"></a-switch>
                </a-form-item>
                <a-form-item label='Noise'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.noise)"
                        @change="(e) => { try { mask.settings.noise = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='[{"type":"rand","packet":"10-20","delay":"10-16"}]'></a-input>
                </a-form-item>
            </template>
            <!-- Settings for Header Custom (UDP) -->
            <template v-if="mask.type === 'header-custom'">
                <a-form-item label='Client'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.client)"
                        @change="(e) => { try { mask.settings.client = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='["hex1","hex2"]'></a-input>
                </a-form-item>
                <a-form-item label='Server'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.server)"
                        @change="(e) => { try { mask.settings.server = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='["hex1","hex2"]'></a-input>
                </a-form-item>
            </template>
            <!-- Settings for Sudoku (UDP) -->
            <template v-if="mask.type === 'sudoku'">
                <a-form-item label='Password'>
                    <a-input v-model.trim="mask.settings.password"
                        placeholder="Shared password"></a-input>
                </a-form-item>
                <a-form-item label='ASCII Mode'>
                    <a-select v-model="mask.settings.ascii"
                        :dropdown-class-name="themeSwitcher.currentTheme">
                        <a-select-option value="prefer_ascii">prefer_ascii</a-select-option>
                        <a-select-option value="force_ascii">force_ascii</a-select-option>
                        <a-select-option value="no_ascii">no_ascii</a-select-option>
                    </a-select>
                </a-form-item>
                <a-form-item label='Padding Min'>
                    <a-input-number v-model.number="mask.settings.paddingMin"
                        :min="0"></a-input-number>
                </a-form-item>
                <a-form-item label='Padding Max'>
                    <a-input-number v-model.number="mask.settings.paddingMax"
                        :min="0"></a-input-number>
                </a-form-item>
            </template>
        </a-form>
    </template>
</a-form>
<a-divider :style="{ margin: '5px 0 0' }" v-if="inbound.stream.network !== 'kcp'"></a-divider>
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }"
    v-if="inbound.stream.network !== 'kcp'">
    <a-form-item label="TCP Masks">
        <a-button icon="plus" type="primary" size="small"
            @click="inbound.stream.addTcpMask('fragment')"></a-button>
    </a-form-item>
    <template v-if="inbound.stream.finalmask.tcp && inbound.stream.finalmask.tcp.length > 0">
        <a-form v-for="(mask, index) in inbound.stream.finalmask.tcp" :key="'tcp-'+index"
            :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
            <a-divider :style="{ margin: '0' }"> TCP Mask [[ index + 1 ]]
                <a-icon type="delete" @click="() => inbound.stream.delTcpMask(index)"
                    :style="{ color: 'rgb(255, 77, 79)', cursor: 'pointer' }"></a-icon>
            </a-divider>
            <a-form-item label='Type'>
                <a-select v-model="mask.type"
                    @change="(type) => { mask.settings = mask._getDefaultSettings(type, {}); }"
                    :dropdown-class-name="themeSwitcher.currentTheme">
                    <a-select-option value="fragment">Fragment (TLS)</a-select-option>
                    <a-select-option value="sudoku">Sudoku</a-select-option>
                    <a-select-option value="header-custom">Header Custom</a-select-option>
                </a-select>
            </a-form-item>
            <!-- Fragment settings -->
            <template v-if="mask.type === 'fragment'">
                <a-form-item label='Packets'>
                    <a-select v-model="mask.settings.packets"
                        :dropdown-class-name="themeSwitcher.currentTheme">
                        <a-select-option value="tlshello">tlshello</a-select-option>
                        <a-select-option value="1-4">1-4</a-select-option>
                        <a-select-option value="1-5">1-5</a-select-option>
                    </a-select>
                </a-form-item>
                <a-form-item label='Length'>
                    <a-input v-model.trim="mask.settings.length" placeholder="10-50"></a-input>
                </a-form-item>
                <a-form-item label='Delay (ms)'>
                    <a-input v-model.trim="mask.settings.delay" placeholder="5-15"></a-input>
                </a-form-item>
                <a-form-item label='Max Split'>
                    <a-input-number v-model.number="mask.settings.maxSplit" :min="0"></a-input-number>
                </a-form-item>
            </template>
            <!-- Sudoku settings -->
            <template v-if="mask.type === 'sudoku'">
                <a-form-item label='Password'>
                    <a-input v-model.trim="mask.settings.password" placeholder="Shared password"></a-input>
                </a-form-item>
                <a-form-item label='ASCII Mode'>
                    <a-select v-model="mask.settings.ascii"
                        :dropdown-class-name="themeSwitcher.currentTheme">
                        <a-select-option value="prefer_ascii">prefer_ascii</a-select-option>
                        <a-select-option value="force_ascii">force_ascii</a-select-option>
                        <a-select-option value="no_ascii">no_ascii</a-select-option>
                    </a-select>
                </a-form-item>
                <a-form-item label='Padding Min'>
                    <a-input-number v-model.number="mask.settings.paddingMin" :min="0"></a-input-number>
                </a-form-item>
                <a-form-item label='Padding Max'>
                    <a-input-number v-model.number="mask.settings.paddingMax" :min="0"></a-input-number>
                </a-form-item>
            </template>
            <!-- Header Custom settings -->
            <template v-if="mask.type === 'header-custom'">
                <a-form-item label='Clients'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.clients)"
                        @change="(e) => { try { mask.settings.clients = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='[["hex1","hex2"],["hex3"]]'></a-input>
                </a-form-item>
                <a-form-item label='Servers'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.servers)"
                        @change="(e) => { try { mask.settings.servers = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='[["hex1"],["hex2","hex3"]]'></a-input>
                </a-form-item>
                <a-form-item label='Errors'>
                    <a-input type="textarea" :rows="3"
                        :value="JSON.stringify(mask.settings.errors)"
                        @change="(e) => { try { mask.settings.errors = JSON.parse(e.target.value); } catch(ex) {} }"
                        placeholder='[["hex1"]]'></a-input>
                </a-form-item>
            </template>
        </a-form>
    </template>
</a-form>
{{end}}
